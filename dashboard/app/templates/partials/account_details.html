{% if success %}
<div class="bg-green-900/50 border border-green-700 text-green-300 px-4 py-2 rounded mb-4 text-sm">
    Account updated successfully.
</div>
{% endif %}

<form hx-post="{{ base_url }}/accounts/{{ account.account_id }}/edit"
      hx-target="#modal-content" hx-swap="innerHTML"
      class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-gray-400 text-xs mb-1">Account ID</label>
            <div class="font-mono text-lg font-bold text-blue-400">{{ account.account_id }}</div>
        </div>
        {% if dealer %}
        <div>
            <label class="block text-gray-400 text-xs mb-1">Full Account (alarm.com)</label>
            <div class="font-mono text-white">{{ dealer.prefix }}{{ account.account_id }}</div>
        </div>
        {% endif %}
    </div>

    <div>
        <label class="block text-gray-400 text-xs mb-1">Customer Name</label>
        <input type="text" name="name" value="{{ account.name }}" required
            class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
    </div>
    <div>
        <label class="block text-gray-400 text-xs mb-1">Address</label>
        <input type="text" name="address" value="{{ account.address or '' }}"
            class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
    </div>
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-gray-400 text-xs mb-1">Phone</label>
            <input type="tel" name="phone" value="{{ account.phone or '' }}"
                class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-gray-400 text-xs mb-1">Email</label>
            <input type="email" name="email" value="{{ account.email or '' }}"
                class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
        </div>
    </div>
    <div>
        <label class="block text-gray-400 text-xs mb-1">Notes</label>
        <textarea name="notes" rows="2"
            class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">{{ account.notes or '' }}</textarea>
    </div>
    <div class="flex space-x-2 pt-2">
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm transition">Save Changes</button>
    </div>
</form>

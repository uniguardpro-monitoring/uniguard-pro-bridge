{% extends "base.html" %}
{% block title %}Login - ARC Dashboard{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-gray-800 rounded-lg shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <img src="{{ P }}/static/logo-white.png" alt="UniguardPro" class="h-12 mx-auto mb-4">
            <p class="text-gray-400 mt-1">Alarm Receiving Centre</p>
        </div>

        {% if error %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ P }}/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-4">
                <label class="block text-gray-300 text-sm font-semibold mb-2" for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username"
                    class="w-full bg-gray-700 text-white border border-gray-600 rounded px-4 py-2 focus:outline-none focus:border-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-300 text-sm font-semibold mb-2" for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                    class="w-full bg-gray-700 text-white border border-gray-600 rounded px-4 py-2 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "dealer/base.html" %}
{% block title %}Settings - {{ dealer.name }}{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold text-white mb-6">Settings</h1>

<div class="bg-gray-800 rounded-lg border border-gray-700 p-6 max-w-lg">
    <h2 class="text-lg font-semibold text-white mb-4">Change Password</h2>

    {% if success %}
    <div class="bg-green-900/50 border border-green-500 rounded px-4 py-2 mb-4 text-green-200 text-sm">
        {{ success }}
    </div>
    {% endif %}

    {% if error %}
    <div class="bg-red-900/50 border border-red-500 rounded px-4 py-2 mb-4 text-red-200 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/settings" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <label class="block text-gray-300 text-sm font-semibold mb-1">Current Password</label>
            <input type="password" name="current_password" required autocomplete="current-password"
                class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-gray-300 text-sm font-semibold mb-1">New Password</label>
            <input type="password" name="new_password" required minlength="8" autocomplete="new-password"
                class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-blue-500">
        </div>
        <div>
            <label class="block text-gray-300 text-sm font-semibold mb-1">Confirm New Password</label>
            <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password"
                class="w-full bg-gray-700 text-white border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-blue-500">
        </div>
        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition">
            Update Password
        </button>
    </form>
</div>

{% endblock %}
